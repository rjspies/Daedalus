name: CD
on:
  workflow_dispatch:
jobs:
  cd:
    permissions:
      contents: write
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: oracle

      - name: Setup Android SDK
        uses: amyu/setup-android@v5
        with:
          cache-disabled: true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Decode keystore
        id: decode_keystore
        uses: timheuer/base64-to-file@v1
        with:
          fileName: "release.jks"
          fileDir: "${{ github.workspace }}/app/keystore"
          encodedString: ${{ secrets.KEYSTORE }}

      - name: Build release
        run: ./gradlew app:assembleRelease
        env:
          DAEDALUS_SIGNING_KEY: ${{ secrets.DAEDALUS_SIGNING_KEY }}
          DAEDALUS_STORE_PASSWORD: ${{ secrets.DAEDALUS_STORE_PASSWORD }}
          DAEDALUS_SIGNING_KEY_PASSWORD: ${{ secrets.DAEDALUS_SIGNING_KEY_PASSWORD }}

      - name: Get current version
        run: echo "version=$(./gradlew version -q)" >> $GITHUB_OUTPUT
        id: version

      - name: Get current version code
        run: echo "versionCode=$(./gradlew versionCode -q)" >> $GITHUB_OUTPUT
        id: versionCode

      - name: Get current date
        run: echo "builddate=$(date +"%Y-%m-%dT%H-%M-%S")" >> $GITHUB_OUTPUT
        id: date

      - name: Create release tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          tag_prefix: ""
          github_token: ${{ github.token }}
          custom_tag: Release/V${{ steps.version.outputs.version }}_${{ steps.date.outputs.builddate }}

      - name: Generate SHA-256 checksum and GPG signature
        run: |
          APK="${{ github.workspace }}/app/build/outputs/apk/release/app-release.apk"
          NAME="Daedalus-${{ steps.version.outputs.version }}-${{ steps.versionCode.outputs.versionCode }}.apk"
          CHECKSUM="${{ github.workspace }}/${NAME}.sha256"

          echo "$(sha256sum "$APK" | awk '{print $1}')  ${NAME}" > "$CHECKSUM"
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --import --batch
          gpg --detach-sign --armor --output "${CHECKSUM}.sig" "$CHECKSUM"
          gpg --batch --yes --delete-secret-and-public-key 903C3C5DE48798F1

      - name: Upload APK to release
        uses: svenstaro/upload-release-action@v2
        with:
          file: "${{ github.workspace }}/app/build/outputs/apk/release/app-release.apk"
          release_name: "v${{ steps.version.outputs.version }} (${{ steps.versionCode.outputs.versionCode }})"
          asset_name: "Daedalus-${{ steps.version.outputs.version }}-${{ steps.versionCode.outputs.versionCode }}.apk"
          tag: Release/V${{ steps.version.outputs.version }}_${{ steps.date.outputs.builddate }}

      - name: Upload checksum to release
        uses: svenstaro/upload-release-action@v2
        with:
          file: "${{ github.workspace }}/Daedalus-${{ steps.version.outputs.version }}-${{ steps.versionCode.outputs.versionCode }}.apk.sha256"
          release_name: "v${{ steps.version.outputs.version }} (${{ steps.versionCode.outputs.versionCode }})"
          asset_name: "Daedalus-${{ steps.version.outputs.version }}-${{ steps.versionCode.outputs.versionCode }}.apk.sha256"
          tag: Release/V${{ steps.version.outputs.version }}_${{ steps.date.outputs.builddate }}

      - name: Upload GPG signature to release
        uses: svenstaro/upload-release-action@v2
        with:
          file: "${{ github.workspace }}/Daedalus-${{ steps.version.outputs.version }}-${{ steps.versionCode.outputs.versionCode }}.apk.sha256.sig"
          release_name: "v${{ steps.version.outputs.version }} (${{ steps.versionCode.outputs.versionCode }})"
          asset_name: "Daedalus-${{ steps.version.outputs.version }}-${{ steps.versionCode.outputs.versionCode }}.apk.sha256.sig"
          tag: Release/V${{ steps.version.outputs.version }}_${{ steps.date.outputs.builddate }}
